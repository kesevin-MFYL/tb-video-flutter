name: editvideo
publish_to: 'none'
description: "A new Flutter project."
version: 1.0.0+1
environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  path_provider: ^2.1.5
  get: ^4.7.2
  get_storage: ^2.1.1 #存储
  logger: ^2.7.0 #logger
  flutter_screenutil: ^5.9.3 #屏幕适配
  flutter_easyloading: ^3.0.5 #加载框
  easy_refresh: ^3.4.0 #刷新
  video_thumbnail: ^0.5.6 #视频第一帧
  app_settings: ^7.0.0 #系统设置
  uuid: ^4.5.3 #uuid
  webview_flutter: ^4.13.1 #内嵌网页
  video_player: ^2.10.1 # 视频播放
  url_launcher: ^6.3.2 #启动链接
  image_picker: ^1.2.1 #图片选择
  wakelock_plus: ^1.2.8 #屏幕常亮
  firebase_crashlytics: ^5.2.0
  firebase_analytics: ^12.3.0
  firebase_core: ^4.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  change_app_package_name: ^1.5.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/common/
    - assets/images/launch/

flutter_assets_generator:
  style: legacy

flutter_native_splash:
  color: "#060600"
  image: assets/images/launch/launch_image.png # 中间的图标
  android_12:
    color: "#060600"
    image: assets/images/launch/launch_image.png
